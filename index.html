<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祭 — Academia de Mandarim</title>
<style>
  :root{
    --ink:#0a0a12;--ink-2:#11111d;--pearl:#f4ecd8;--gold:#c9a227;--gold-bright:#e7c75a;
    --vermilion:#d4332e;--jade:#3fa99a;--violet:#9d6bff;--cyan:#5bd0e8;--rose:#e89bb4;
    --glass:rgba(244,236,216,.05);
    --serif:"Songti SC","Noto Serif JP","Songti TC",Georgia,serif;
    --sans:"PingFang SC","Hiragino Sans GB","Noto Sans JP",system-ui,sans-serif;
    --t1:var(--vermilion);--t2:var(--gold-bright);--t3:var(--jade);--t4:var(--violet);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--ink);color:var(--pearl)}
  body{font-family:var(--sans);cursor:none}
  ::selection{background:rgba(201,162,39,.3)}

  /* cursor */
  #cursor{position:fixed;top:0;left:0;width:34px;height:34px;border-radius:50%;
    border:1px solid rgba(231,199,90,.6);transform:translate(-50%,-50%);pointer-events:none;
    z-index:9999;transition:width .25s,height .25s,border-color .25s,background .25s;mix-blend-mode:screen}
  #cursor::after{content:"";position:absolute;inset:50%;width:4px;height:4px;background:var(--gold-bright);
    border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 12px var(--gold-bright)}
  #cursor.hot{width:56px;height:56px;border-color:var(--vermilion);
    background:radial-gradient(circle,rgba(212,51,46,.12),transparent 70%)}
  @media(pointer:coarse){#cursor{display:none}body{cursor:auto}}

  canvas{position:fixed;inset:0;display:block}
  #sky{z-index:0}#petals{z-index:5;pointer-events:none}
  #atmos{position:fixed;inset:0;z-index:1;pointer-events:none;transition:background 6s linear}
  #mountains{position:fixed;left:0;right:0;bottom:0;height:42vh;z-index:2;pointer-events:none}

  /* loader */
  #loader{position:fixed;inset:0;z-index:10000;background:var(--ink);display:flex;align-items:center;
    justify-content:center;flex-direction:column;transition:opacity 1.4s ease,visibility 1.4s}
  #loader.gone{opacity:0;visibility:hidden}
  .seal-load{width:120px;height:120px;border:1px solid var(--gold);border-radius:50%;display:flex;
    align-items:center;justify-content:center;position:relative;animation:spin 8s linear infinite}
  .seal-load::before{content:"";position:absolute;inset:14px;border:1px solid rgba(201,162,39,.35);border-radius:50%}
  .seal-load span{font-family:var(--serif);font-size:54px;color:var(--gold-bright);
    text-shadow:0 0 24px rgba(231,199,90,.6);animation:spin 8s linear infinite reverse}
  #loader p{margin-top:26px;letter-spacing:.5em;font-size:11px;color:rgba(244,236,216,.5);
    text-transform:uppercase;animation:pulse 2.4s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  #stage{position:fixed;inset:0;z-index:6}
  /* central seal */
  #core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:min(46vmin,420px);height:min(46vmin,420px);display:flex;align-items:center;
    justify-content:center;pointer-events:none}
  .ring{position:absolute;border-radius:50%;border:1px solid rgba(201,162,39,.4);pointer-events:none}
  .ring.r1{inset:0;animation:spin 60s linear infinite}
  .ring.r2{inset:9%;border-style:dashed;border-color:rgba(63,169,154,.4);animation:spin 42s linear infinite reverse}
  .ring.r3{inset:20%;border-color:rgba(157,107,255,.35);animation:spin 30s linear infinite}
  .glyphs{position:absolute;inset:0;animation:spin 90s linear infinite}
  .glyphs span{position:absolute;left:50%;top:50%;font-family:var(--serif);font-size:15px;
    color:rgba(244,236,216,.5);transform-origin:0 0}
  #coreKanji{font-family:var(--serif);font-size:min(20vmin,150px);color:var(--pearl);
    text-shadow:0 0 40px rgba(231,199,90,.45),0 0 80px rgba(212,51,46,.25);
    animation:breathe 6s ease-in-out infinite;cursor:none;pointer-events:auto;text-align:center;line-height:1}
  #coreSub{position:absolute;bottom:-12%;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:rgba(201,162,39,.7);pointer-events:none}
  @keyframes breathe{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.045);filter:brightness(1.2)}}

  .lantern{position:absolute;top:-2vh;width:50px;transform-origin:50% -40px;
    animation:sway var(--sway,6s) ease-in-out infinite;z-index:7}
  .lantern svg{filter:drop-shadow(0 0 18px rgba(212,51,46,.55))}
  @keyframes sway{0%,100%{transform:rotate(var(--a,4deg))}50%{transform:rotate(calc(var(--a,4deg)*-1))}}

  /* constellation nodes = ambientes */
  .node{position:absolute;width:130px;height:140px;transform:translate(-50%,-50%);display:flex;
    align-items:center;justify-content:center;flex-direction:column;pointer-events:auto;cursor:none;z-index:8}
  .node .orb{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:26px;background:radial-gradient(circle at 35% 30%,rgba(244,236,216,.16),rgba(20,18,30,.7));
    border:1px solid rgba(231,199,90,.45);box-shadow:0 0 22px rgba(231,199,90,.25);position:relative;
    transition:transform .4s cubic-bezier(.2,.9,.2,1),box-shadow .4s,border-color .4s}
  .node .orb::before{content:"";position:absolute;inset:-9px;border:1px solid rgba(231,199,90,.3);
    border-radius:50%;transition:.5s;opacity:.6}
  .node .label{margin-top:14px;font-family:var(--serif);font-size:15px;letter-spacing:.1em;
    color:rgba(244,236,216,.85);text-align:center;white-space:nowrap}
  .node .sub{font-size:8.5px;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,162,39,.6);margin-top:5px}
  .node:hover .orb{transform:scale(1.18);box-shadow:0 0 40px var(--gold-bright);border-color:#fff}
  .node:hover .orb::before{transform:scale(1.6);opacity:0}
  .node .prog{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;
    background:var(--jade);color:#04130f;font-size:9px;display:none;align-items:center;justify-content:center;
    font-weight:700;border:1px solid #04130f}
  .node.has-prog .prog{display:flex}

  #links{position:fixed;inset:0;z-index:6;pointer-events:none}
  #links line{stroke:rgba(201,162,39,.14);stroke-width:1;stroke-dasharray:3 7}

  /* HUD */
  #brand{position:fixed;top:26px;left:32px;z-index:20;pointer-events:none}
  #brand .jp{font-family:var(--serif);font-size:23px;color:var(--pearl);letter-spacing:.1em}
  #brand .en{font-size:8.5px;letter-spacing:.42em;color:rgba(201,162,39,.7);text-transform:uppercase;margin-top:4px}

  #rank{position:fixed;top:28px;right:32px;z-index:20;text-align:right;pointer-events:auto;cursor:none}
  #rank .title{font-family:var(--serif);font-size:17px;color:var(--jade);letter-spacing:.06em}
  #rank .bar{width:140px;height:4px;background:rgba(244,236,216,.12);border-radius:3px;margin-top:7px;overflow:hidden;margin-left:auto}
  #rank .fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-bright));transition:width .8s}
  #rank .xp{font-size:8.5px;letter-spacing:.25em;color:rgba(244,236,216,.45);text-transform:uppercase;margin-top:6px}

  #hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:20;font-size:9.5px;
    letter-spacing:.38em;color:rgba(244,236,216,.4);text-transform:uppercase;pointer-events:none;
    animation:pulse 3s ease-in-out infinite;text-align:center;padding:0 16px}

  .corner-btn{position:fixed;bottom:24px;z-index:30;width:44px;height:44px;border:1px solid rgba(201,162,39,.4);
    border-radius:50%;background:var(--glass);display:flex;align-items:center;justify-content:center;cursor:none;
    backdrop-filter:blur(4px);transition:.4s;color:var(--gold)}
  .corner-btn:hover{border-color:var(--gold-bright);background:rgba(201,162,39,.12)}
  #sound{right:32px}#review{right:84px}
  #review .dot{position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
    background:var(--vermilion);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;font-weight:700}
  #review.due .dot{display:flex}
  #sound .wave{opacity:0;transition:.4s}#sound.on .wave{opacity:1}

  /* ---- Dragão guardião ---- */
  #dragonWrap{position:fixed;left:5vw;bottom:11vh;z-index:9;pointer-events:none;width:min(34vw,360px)}
  #dragon{width:100%;height:auto;overflow:visible;display:block}
  #dragonBubble{position:absolute;left:50%;bottom:100%;transform:translateX(-30%) translateY(-2px) scale(.9);
    background:rgba(11,10,17,.95);border:1px solid var(--gold);border-radius:16px;padding:10px 16px;
    font-size:12.5px;letter-spacing:.02em;color:var(--pearl);max-width:300px;
    opacity:0;transition:opacity .5s,transform .5s;pointer-events:none;line-height:1.5}
  #dragonBubble.show{opacity:1;transform:translateX(-30%) translateY(-2px) scale(1)}
  #dragonBubble::after{content:"";position:absolute;left:30%;top:100%;transform:translateX(-50%);
    border:7px solid transparent;border-top-color:var(--gold)}
  #dragonBubble b{color:var(--gold-bright);font-family:var(--serif)}
  @media(max-width:900px){#dragonWrap{width:46vw;bottom:8vh;opacity:.92}}
  @media(max-width:560px){#dragonWrap{width:60vw;left:2vw}#dragonBubble{max-width:64vw}}
  #idol{position:fixed;right:3vw;bottom:0;height:84vh;z-index:4;pointer-events:none;
    filter:drop-shadow(0 0 50px rgba(157,107,255,.25))}
  @media(max-width:900px){#idol{opacity:.3;right:-8vw;height:64vh}}

  /* ============ ROOM (ambiente aberto) ============ */
  #veil{position:fixed;inset:0;z-index:40;background:rgba(5,5,10,0);backdrop-filter:blur(0);
    pointer-events:none;transition:background .8s,backdrop-filter .8s}
  #veil.show{background:rgba(5,5,10,.62);backdrop-filter:blur(12px);pointer-events:auto}

  #room{position:fixed;left:50%;top:50%;z-index:41;width:min(880px,94vw);max-height:90vh;
    transform:translate(-50%,-45%) scale(.94);opacity:0;pointer-events:none;
    transition:transform .9s cubic-bezier(.16,1,.3,1),opacity .6s;display:flex;flex-direction:column}
  #room.show{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
  .room-frame{position:relative;background:linear-gradient(180deg,rgba(20,18,28,.97),rgba(11,10,17,.99));
    border:1px solid rgba(201,162,39,.28);border-radius:8px;overflow:hidden;
    box-shadow:0 40px 120px rgba(0,0,0,.7),inset 0 0 60px rgba(201,162,39,.04);display:flex;flex-direction:column;max-height:90vh}
  .room-frame::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,var(--vermilion),var(--gold),var(--jade));z-index:3}
  .room-head{padding:24px 56px 16px 30px;display:flex;align-items:flex-start;gap:16px;border-bottom:1px solid rgba(201,162,39,.12)}
  .room-head .rh-emoji{font-size:34px;line-height:1}
  .room-head .rh-txt h2{font-family:var(--serif);font-size:21px;letter-spacing:.04em;margin-bottom:3px}
  .room-head .rh-txt p{font-size:11px;color:rgba(244,236,216,.55);letter-spacing:.04em;line-height:1.5;max-width:52ch}
  .room-head .rh-master{margin-left:auto;text-align:right;font-size:10px;color:rgba(201,162,39,.7);
    font-style:italic;max-width:160px;line-height:1.5}
  .room-head .rh-master b{display:block;font-family:var(--serif);font-style:normal;color:var(--jade);font-size:13px;margin-bottom:2px}
  .room-body{padding:26px 30px 30px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold) transparent}
  .room-body::-webkit-scrollbar{width:6px}.room-body::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
  .close{position:absolute;top:14px;right:16px;width:34px;height:34px;border-radius:50%;
    border:1px solid rgba(244,236,216,.2);display:flex;align-items:center;justify-content:center;cursor:none;
    color:rgba(244,236,216,.6);font-size:18px;font-family:var(--serif);transition:.3s;z-index:5;background:rgba(11,10,17,.6)}
  .close:hover{border-color:var(--vermilion);color:var(--vermilion);transform:rotate(90deg)}

  /* ---- Hanzi grid (Biblioteca) ---- */
  .hz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .hz-cell{aspect-ratio:1;border:1px solid rgba(201,162,39,.18);border-radius:6px;background:rgba(244,236,216,.02);
    display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:none;transition:.3s;position:relative;overflow:hidden}
  .hz-cell:hover{border-color:var(--gold-bright);background:rgba(201,162,39,.08);transform:translateY(-3px)}
  .hz-cell .z{font-family:var(--serif);font-size:38px;line-height:1}
  .hz-cell .py{font-size:10px;color:var(--gold);margin-top:4px;letter-spacing:.04em}
  .hz-cell .learned{position:absolute;top:5px;right:6px;font-size:10px;color:var(--jade);opacity:0;transition:.3s}
  .hz-cell.learned .learned{opacity:1}
  .hz-cell .tone-dot{position:absolute;top:6px;left:7px;width:7px;height:7px;border-radius:50%}

  /* ---- Hanzi detail ---- */
  .hz-detail{display:grid;grid-template-columns:240px 1fr;gap:28px;align-items:start}
  @media(max-width:680px){.hz-detail{grid-template-columns:1fr}}
  .stroke-stage{width:240px;height:240px;border:1px solid rgba(201,162,39,.2);border-radius:8px;
    background:radial-gradient(circle at 50% 50%,rgba(201,162,39,.05),transparent 70%);position:relative;margin:0 auto}
  .stroke-stage svg{position:absolute;inset:0;width:100%;height:100%}
  .stroke-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:10px;letter-spacing:.2em;color:rgba(244,236,216,.4);text-transform:uppercase}
  .grid-line{stroke:rgba(244,236,216,.07);stroke-width:1.5;stroke-dasharray:6 10}
  .stroke-ghost{fill:rgba(244,236,216,.08)}
  .stroke-paint{stroke:var(--gold-bright);stroke-width:170;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .stroke-count{text-align:center;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,162,39,.6);margin-top:10px}
  .stroke-ctrls{display:flex;gap:8px;justify-content:center;margin-top:14px}
  .mini-btn{border:1px solid rgba(201,162,39,.4);background:transparent;color:var(--pearl);font-family:var(--sans);
    font-size:11px;letter-spacing:.1em;padding:8px 14px;border-radius:20px;cursor:none;transition:.3s;display:inline-flex;align-items:center;gap:6px}
  .mini-btn:hover{border-color:var(--gold-bright);background:rgba(201,162,39,.12);color:#fff}
  .mini-btn.primary{background:var(--vermilion);border-color:var(--vermilion);color:#fff}
  .mini-btn.primary:hover{background:#e8483f}
  .hz-info h3{font-family:var(--serif);font-size:52px;line-height:1;display:flex;align-items:baseline;gap:14px}
  .hz-info h3 .meta{font-size:16px;color:var(--gold);font-family:var(--sans)}
  .hz-info .tone-tag{font-size:11px;padding:2px 10px;border-radius:12px;letter-spacing:.1em}
  .hz-info .blk{margin-top:16px}
  .hz-info .blk .lab{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,162,39,.7);margin-bottom:5px}
  .hz-info .blk p{font-size:13px;line-height:1.7;color:rgba(244,236,216,.82)}
  .word-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .word-chip{border:1px solid rgba(63,169,154,.3);border-radius:6px;padding:6px 10px;cursor:none;transition:.3s}
  .word-chip:hover{background:rgba(63,169,154,.12);border-color:var(--jade)}
  .word-chip .wz{font-family:var(--serif);font-size:16px}
  .word-chip .wp{font-size:9px;color:var(--gold)}
  .word-chip .wm{font-size:10px;color:rgba(244,236,216,.6)}

  /* ---- Tones (Salão) ---- */
  .tone-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  @media(max-width:680px){.tone-row{grid-template-columns:repeat(2,1fr)}}
  .tone-card{border:1px solid rgba(201,162,39,.2);border-radius:8px;padding:16px 12px;text-align:center;
    cursor:none;transition:.3s;position:relative;overflow:hidden}
  .tone-card:hover{transform:translateY(-3px);border-color:var(--gold-bright)}
  .tone-card .tn{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(244,236,216,.5)}
  .tone-card .tm{font-family:var(--serif);font-size:40px;line-height:1.1;margin:6px 0}
  .tone-card svg{width:100%;height:46px}
  .tone-card .tname{font-size:11px;color:var(--pearl);margin-top:6px}
  .tone-card .tdesc{font-size:9.5px;color:rgba(244,236,216,.5);line-height:1.5;margin-top:6px}
  .tone-curve{stroke-width:3;fill:none;stroke-linecap:round}

  /* pronunciation practice block */
  .pron-block{border:1px solid rgba(201,162,39,.2);border-radius:8px;padding:20px;margin-top:8px;text-align:center}
  .pron-block .big{font-family:var(--serif);font-size:60px;line-height:1}
  .pron-block .bigpy{font-size:16px;color:var(--gold);letter-spacing:.06em;margin-top:4px}
  .pron-block .bigm{font-size:12px;color:rgba(244,236,216,.6);margin-top:2px}
  .pron-ctrls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  .listen-meter{height:5px;background:rgba(244,236,216,.1);border-radius:3px;margin-top:18px;overflow:hidden}
  .listen-meter .lm{height:100%;width:0;background:linear-gradient(90deg,var(--jade),var(--cyan));transition:width .08s}
  .feedback{font-size:12px;margin-top:12px;min-height:18px;letter-spacing:.04em;color:var(--jade)}

  /* ---- Garden ---- */
  .garden-scene{position:relative;min-height:300px;border-radius:8px;overflow:hidden;
    background:linear-gradient(180deg,rgba(63,169,154,.06),rgba(20,18,30,.4))}
  .g-item{position:absolute;font-size:30px;cursor:none;transition:transform .3s;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
  .g-item:hover{transform:scale(1.3) translateY(-4px)}
  .g-pop{position:absolute;z-index:5;background:rgba(11,10,17,.96);border:1px solid var(--gold);border-radius:8px;
    padding:12px 16px;width:180px;opacity:0;transform:translateY(8px) scale(.9);pointer-events:none;transition:.3s;text-align:center}
  .g-pop.show{opacity:1;transform:none}
  .g-pop .gz{font-family:var(--serif);font-size:30px}
  .g-pop .gpy{font-size:11px;color:var(--gold)}
  .g-pop .gm{font-size:11px;color:rgba(244,236,216,.7);margin-top:2px}

  /* ---- SRS review ---- */
  .srs-card{border:1px solid rgba(201,162,39,.25);border-radius:10px;padding:34px 24px;text-align:center;min-height:260px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
  .srs-card .q{font-family:var(--serif);font-size:72px;line-height:1}
  .srs-card .qpy{font-size:15px;color:var(--gold);opacity:0;transition:.4s}
  .srs-card .qm{font-size:14px;color:rgba(244,236,216,.8);opacity:0;transition:.4s}
  .srs-card.revealed .qpy,.srs-card.revealed .qm{opacity:1}
  .srs-grade{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .srs-prog{text-align:center;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(244,236,216,.45);margin-bottom:16px}
  .srs-empty{text-align:center;padding:30px}
  .srs-empty .em{font-size:48px}.srs-empty p{margin-top:14px;color:rgba(244,236,216,.7);font-size:13px;line-height:1.6}

  /* ---- Casa do Chá ---- */
  .tea-wrap{display:flex;flex-direction:column;gap:16px}
  .tea-npc{display:flex;align-items:center;gap:12px}
  .tea-face{font-size:40px;filter:drop-shadow(0 0 16px rgba(231,199,90,.4));animation:breathe 5s ease-in-out infinite}
  .tea-name{font-family:var(--serif);font-size:15px;color:var(--jade);letter-spacing:.06em}
  .tea-stream{display:flex;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto;padding:6px 4px;
    scrollbar-width:thin;scrollbar-color:var(--gold) transparent}
  .bubble{max-width:78%;padding:12px 16px;border-radius:14px;animation:rise .5s both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .bubble.npc{align-self:flex-start;background:rgba(63,169,154,.1);border:1px solid rgba(63,169,154,.3);border-bottom-left-radius:4px}
  .bubble.me{align-self:flex-end;background:rgba(212,51,46,.12);border:1px solid rgba(212,51,46,.3);border-bottom-right-radius:4px;text-align:right}
  .bubble .bz{font-family:var(--serif);font-size:22px;line-height:1.2}
  .bubble .bpy{font-size:11px;color:var(--gold);margin-top:3px}

  .opt-btn .opy{font-size:10px;color:var(--gold)}
  .opt-btn .om{font-size:10px;color:rgba(244,236,216,.55)}
  .tea-done{font-family:var(--serif);font-size:15px;color:var(--jade);text-align:center;padding:10px}

  /* ---- Floresta das Aventuras ---- */
  .adv-wrap{display:flex;flex-direction:column;gap:18px}
  .adv-title{font-family:var(--serif);font-size:17px;color:var(--gold-bright);letter-spacing:.04em;text-align:center}
  .adv-scene{font-size:16px;line-height:2;color:rgba(244,236,216,.85);text-align:center;padding:24px;
    border:1px solid rgba(201,162,39,.2);border-radius:10px;

    display:flex;align-items:center;justify-content:center}

  .adv-end{font-family:var(--serif);font-size:18px;color:var(--jade);text-align:center;padding:14px 20px;
    border:1px solid rgba(63,169,154,.3);border-radius:10px;background:rgba(63,169,154,.08)}

  /* ---- Vila das Histórias ---- */

  .vil-toggle{font-size:11px;color:rgba(244,236,216,.6);display:flex;align-items:center;gap:6px;cursor:none}

  .tk-py{font-size:10px;color:var(--gold);margin-top:3px;min-height:12px}

  .vil-ctrls{display:flex;align-items:center;gap:12px;justify-content:center;margin-top:18px}

  #toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);z-index:90;
    background:rgba(11,10,17,.95);border:1px solid var(--gold);border-radius:30px;padding:12px 24px;
    font-size:13px;letter-spacing:.04em;opacity:0;transition:.5s;pointer-events:none;display:flex;align-items:center;gap:10px}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  }
</style>

<script>"use strict";
const DATA=window.ACADEMIA_DATA;
const {HANZI,PHRASES,TONES,DIALOGUES,ADVENTURES,STORIES,MARKET,HSK_INFO,DRAGON}=DATA;
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
const TAU=Math.PI*2, rand=(a,b)=>a+Math.random()*(b-a), lerp=(a,b,t)=>a+(b-a)*t;
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

/* ===================== PERSISTÊNCIA ===================== */
const SAVE_KEY="academia_matsuri_v1";
const defaultState=()=>({seals:0, learned:{}, srs:{}, rankIdx:0, lastSeen:Date.now()});
let S=load();
function load(){try{const r=JSON.parse(localStorage.getItem(SAVE_KEY));return r?{...defaultState(),...r}:defaultState();}catch{return defaultState();}}
function save(){S.lastSeen=Date.now();try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch{}}

const RANKS=[
  {k:"初",n:"Iniciante",need:0},{k:"徒",n:"Aprendiz",need:5},{k:"弟",n:"Discípulo",need:12},
  {k:"士",n:"Estudioso",need:22},{k:"儒",n:"Erudito",need:36},{k:"師",n:"Mestre",need:54},
  {k:"聖",n:"Guardião dos Clássicos",need:80}
];
function rankFor(seals){let i=0;for(let j=0;j<RANKS.length;j++)if(seals>=RANKS[j].need)i=j;return i;}
function updateRank(){
  const i=rankFor(S.seals);
  if(i>S.rankIdx){S.rankIdx=i;promote(RANKS[i]);}
  $("#rankTitle").textContent=RANKS[S.rankIdx].n;
  const cur=RANKS[S.rankIdx],nxt=RANKS[S.rankIdx+1];
  const pct=nxt?Math.min(100,((S.seals-cur.need)/(nxt.need-cur.need))*100):100;
  $("#rankFill").style.width=pct+"%";
  $("#rankXp").textContent=S.seals+" selos"+(nxt?` · ${nxt.need-S.seals} p/ ${nxt.n}`:" · máximo");
}
function award(n=1,msg){S.seals+=n;save();updateRank();if(msg)toast("🏮",msg);refreshNodeProgress();}

function promote(r){
  $("#promoK").textContent=r.k;$("#promoN").textContent=r.n;
  $("#promoD").textContent="Você ascendeu. O santuário reconhece o seu caminho.";
  const p=$("#promo");p.classList.add("show");burst(innerWidth/2,innerHeight/2,40);
  setTimeout(()=>p.classList.remove("show"),3400);
  setTimeout(()=>dragonSay(`<b>龙</b> ${dragonLine(DRAGON.promote)}`,5200),3600);
}

function hotify(root=document){root.querySelectorAll("a,button,.node,#coreKanji,.close,.hz-cell,.tone-card,.word-chip,.mini-btn,.g-item,#rank,.srs-card").forEach(el=>{
  if(el._hot)return;el._hot=1;

function drawPetal(p){pc.save();pc.translate(p.x,p.y);pc.rotate(p.rot);pc.scale(p.z,p.z);
  const g=pc.createLinearGradient(0,-p.sz,0,p.sz);
  if(p.hue==="rose"){g.addColorStop(0,"rgba(232,155,180,.9)");g.addColorStop(1,"rgba(212,51,46,.5)");}
  else{g.addColorStop(0,"rgba(231,199,90,.95)");g.addColorStop(1,"rgba(201,162,39,.5)");}
  pc.fillStyle=g;pc.beginPath();pc.moveTo(0,-p.sz);
  pc.bezierCurveTo(p.sz*.7,-p.sz*.5,p.sz*.5,p.sz*.6,0,p.sz);
  pc.bezierCurveTo(-p.sz*.5,p.sz*.6,-p.sz*.7,-p.sz*.5,0,-p.sz);pc.fill();
  pc.strokeStyle="rgba(255,255,255,.12)";pc.lineWidth=.6;pc.stroke();pc.restore();}

let t=0;
function render(){t++;
  sc.clearRect(0,0,W,H);
  const sg=sc.createLinearGradient(0,0,0,H);sg.addColorStop(0,phase.sky0);sg.addColorStop(1,phase.sky1);
  sc.fillStyle=sg;sc.fillRect(0,0,W,H);
  for(const s of stars){const a=.4+.6*Math.abs(Math.sin(t*.01*s.sp+s.tw));sc.globalAlpha=a*phase.starA;sc.fillStyle="#fff";sc.beginPath();sc.arc(s.x*W,s.y*H,s.r,0,TAU);sc.fill();}
  sc.globalAlpha=1;
  const moonX=W*.78,moonY=H*.22,mg=sc.createRadialGradient(moonX,moonY,4,moonX,moonY,90);
  mg.addColorStop(0,"rgba(244,236,216,.95)");mg.addColorStop(.5,"rgba(231,199,90,.25)");mg.addColorStop(1,"rgba(231,199,90,0)");
  sc.fillStyle=mg;sc.beginPath();sc.arc(moonX,moonY,90,0,TAU);sc.fill();
  for(const f of fireflies){f.x+=f.vx;f.y+=f.vy;f.ph+=.03;if(f.x<0||f.x>1)f.vx*=-1;if(f.y<.4||f.y>1)f.vy*=-1;
    const a=(.4+.6*Math.sin(f.ph))*phase.fireA;sc.globalAlpha=Math.max(0,a);
    const fg=sc.createRadialGradient(f.x*W,f.y*H,0,f.x*W,f.y*H,10);fg.addColorStop(0,"rgba(231,199,90,.9)");fg.addColorStop(1,"rgba(231,199,90,0)");
    sc.fillStyle=fg;sc.beginPath();sc.arc(f.x*W,f.y*H,10,0,TAU);sc.fill();}
  sc.globalAlpha=1;
  pc.clearRect(0,0,W,H);
  petalDim=lerp(petalDim, roomOpen?0.12:1, 0.06);
  for(const d of GOLD){const dx=mx-d.x,dy=my-d.y,dist=Math.hypot(dx,dy);if(dist<150){d.x+=dx/dist*.35;d.y+=dy/dist*.35;}d.ph+=.02;
    pc.globalAlpha=(.18+.28*Math.sin(d.ph+d.sp))*petalDim;pc.fillStyle="#e7c75a";pc.beginPath();pc.arc(d.x,d.y,d.r,0,TAU);pc.fill();}
  pc.globalAlpha=1;
  for(const p of PET){p.y+=p.vy*p.z*(reduce?0:1);p.x+=p.vx+Math.sin((p.y+t)*.01)*.3;p.rot+=p.vr;
    const dx=p.x-mx,dy=p.y-my,d2=dx*dx+dy*dy;if(d2<11000){const d=Math.sqrt(d2)||1;p.x+=dx/d*1.8;p.y+=dy/d*1.8;}
    if(p.y>H+20){p.y=-20;p.x=rand(0,W);}if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;
    pc.globalAlpha=petalDim*0.82;drawPetal(p);}
  pc.globalAlpha=1;
  requestAnimationFrame(render);}

let actx;function AC(){if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();return actx;}
let zhVoice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();zhVoice=vs.find(v=>/zh|cmn|Chinese/i.test(v.lang))||null;}
if("speechSynthesis"in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
// fala real (se houver voz chinesa); sempre acompanha o tom sintetizado
function speak(text,{slow=false,female=true}={}){
  if(!("speechSynthesis"in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="zh-CN";if(zhVoice)u.voice=zhVoice;u.rate=slow?.55:.9;u.pitch=female?1.15:.8;
  speechSynthesis.speak(u);
}
// tom sintetizado: curva de frequência (sensação musical do tom)
function playTone(toneN,dur=.7){
  const ac=AC(),o=ac.createOscillator(),g=ac.createGain();
  o.type="sine";const T=TONES[toneN-1];const f=T.freq;const now=ac.currentTime;
  o.frequency.setValueAtTime(f[0],now);
  f.forEach((hz,i)=>{o.frequency.exponentialRampToValueAtTime(hz,now+dur*(i/(f.length-1||1)));});
  g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(.22,now+.04);
  g.gain.exponentialRampToValueAtTime(.0001,now+dur);
  o.connect(g);g.connect(masterOrDest());o.start(now);o.stop(now+dur+.05);
}
// pronuncia uma sílaba: tom sintetizado + (se disponível) voz real
function pronounce(hz,toneN,{slow=false,female=true}={}){
  if(toneN)playTone(toneN,slow?1.1:.7);
  setTimeout(()=>speak(hz,{slow,female}),toneN?140:0);
}
function masterOrDest(){return ambientMaster||AC().destination;}

/* ambiente sonoro (sino, vento, drone) — reaproveitado */
let ambientMaster=null,ambientOn=false,ambientNodes=[];
function startAmbient(){const ac=AC();ambientMaster=ac.createGain();ambientMaster.gain.value=0;ambientMaster.connect(ac.destination);
  const lp=ac.createBiquadFilter();lp.type="lowpass";lp.frequency.value=520;lp.connect(ambientMaster);
  [196,261.63,329.63].forEach((f,i)=>{const o=ac.createOscillator();o.type="sine";o.frequency.value=f;
    const g=ac.createGain();g.gain.value=.1;const lfo=ac.createOscillator();lfo.frequency.value=.07+i*.02;
    const lg=ac.createGain();lg.gain.value=.05;lfo.connect(lg);lg.connect(g.gain);o.connect(g);g.connect(lp);o.start();lfo.start();ambientNodes.push(o,lfo);});
  const buf=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate),dat=buf.getChannelData(0);
  for(let i=0;i<dat.length;i++)dat[i]=Math.random()*2-1;
  const noise=ac.createBufferSource();noise.buffer=buf;noise.loop=true;
  const nf=ac.createBiquadFilter();nf.type="bandpass";nf.frequency.value=600;nf.Q.value=.6;
  const ng=ac.createGain();ng.gain.value=.035;noise.connect(nf);nf.connect(ng);ng.connect(ambientMaster);noise.start();ambientNodes.push(noise);}
$("#sound").addEventListener("click",()=>{if(!ambientMaster)startAmbient();ambientOn=!ambientOn;
  $("#sound").classList.toggle("on",ambientOn);ambientMaster.gain.linearRampToValueAtTime(ambientOn?.5:0,AC().currentTime+1.2);});

// comparação de voz: usa microfone só para medir energia/altura aproximada
function micCompare(container,toneN){
  const fb=container.querySelector(".feedback"),lm=container.querySelector(".lm");
  if(!navigator.mediaDevices?.getUserMedia){fb.textContent="Seu navegador não permite microfone aqui.";return;}
  fb.style.color="var(--gold)";fb.textContent="Ouvindo… imite o tom!";
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ac=AC(),src=ac.createMediaStreamSource(stream),an=ac.createAnalyser();an.fftSize=2048;src.connect(an);
    const buf=new Float32Array(an.fftSize);const samples=[];const t0=performance.now();
    (function tickMic(){const dt=performance.now()-t0;an.getFloatTimeDomainData(buf);
      let rms=0;for(let i=0;i<buf.length;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/buf.length);
      lm.style.width=Math.min(100,rms*400)+"%";samples.push(rms);
      if(dt<1600)requestAnimationFrame(tickMic);
      else{stream.getTracks().forEach(t=>t.stop());lm.style.width="0%";
        const peak=Math.max(...samples);
        if(peak<.01){fb.style.color="var(--vermilion)";fb.textContent="Não te ouvi — fale mais perto do microfone.";}
        else{fb.style.color="var(--jade)";fb.textContent="好! Boa energia. Agora ouça o ideal e compare ▶";}
      }
    })();
  }).catch(()=>{fb.style.color="var(--vermilion)";fb.textContent="Permissão de microfone negada.";});
}

/* ====== TRAÇOS: técnica median-clip (estilo Hanzi Writer / Make Me a Hanzi) ======
   Cada traço é um contorno PREENCHIDO. Para "escrever", animamos uma linha grossa
   ao longo da mediana (centerline) recortada (clip) pelo contorno do traço.
   Resultado: o pincel parece preencher o traço na direção e ordem corretas. */
let strokeTimers=[],curStrokeData=null,curHanzi=null;
function initStrokes(h){
  curHanzi=h;curStrokeData=null;
  strokeTimers.forEach(clearTimeout);strokeTimers=[];
  const layer=$("#strokeLayer");layer.innerHTML="";
  $("#strokeLoading").style.display="block";
  $("#strokeCount").textContent="";
  DATA.loadStrokeData(h.z).then(data=>{
    if(curHanzi!==h)return; // trocou de caractere enquanto carregava
    $("#strokeLoading").style.display="none";
    if(!data||!data.strokes){ // sem dado: desenha o glifo da fonte como recurso final
      layer.removeAttribute("transform");
      layer.innerHTML=`<text x="512" y="660" text-anchor="middle" font-size="640" fill="var(--gold-bright)" font-family="var(--serif)">${h.z}</text>`;
      $("#strokeCount").textContent="(animação indisponível offline para este caractere)";
      return;
    }
    curStrokeData=data;buildStrokeDOM(data);animateStrokes();
    $("#strokeCount").textContent=`${data.strokes.length} traços · ordem oficial`;
  });
}
function buildStrokeDOM(data){
  const layer=$("#strokeLayer");layer.setAttribute("transform","translate(0,900) scale(1,-1)");
  layer.innerHTML="";
  const NS="http://www.w3.org/2000/svg";
  data.strokes.forEach((d,i)=>{
    // contorno fantasma (cinza) — mostra onde o traço vai aparecer
    const ghost=document.createElementNS(NS,"path");
    ghost.setAttribute("d",d);ghost.setAttribute("class","stroke-ghost");layer.appendChild(ghost);
    // clip com o contorno do traço
    const cp=document.createElementNS(NS,"clipPath");cp.id="cp"+i;
    const cpp=document.createElementNS(NS,"path");cpp.setAttribute("d",d);cp.appendChild(cpp);layer.appendChild(cp);
    // linha mediana grossa, recortada pelo contorno
    const med=document.createElementNS(NS,"path");
    const pts=data.medians[i]||[];
    med.setAttribute("d",pts.map((p,k)=>(k?"L":"M")+p[0]+" "+p[1]).join(" "));
    med.setAttribute("class","stroke-paint");med.setAttribute("clip-path",`url(#cp${i})`);
    med.id="paint"+i;layer.appendChild(med);
  });
}
function animateStrokes(){
  if(!curStrokeData)return;
  strokeTimers.forEach(clearTimeout);strokeTimers=[];
  const tip=$("#brushTip");
  let delay=0;
  curStrokeData.strokes.forEach((d,i)=>{
    const med=$("#paint"+i);if(!med)return;
    const len=med.getTotalLength();
    med.style.transition="none";med.style.strokeDasharray=len;med.style.strokeDashoffset=len;
    const dur=Math.max(360,len*0.95); // ms — proporcional ao tamanho do traço
    strokeTimers.push(setTimeout(()=>{
      med.style.transition=`stroke-dashoffset ${dur}ms cubic-bezier(.45,.05,.3,1)`;
      med.style.strokeDashoffset=0;
      animateBrushTip(med,len,dur,tip);
    },delay));
    delay+=dur+170;
  });
  // esconde o pincel ao final
  strokeTimers.push(setTimeout(()=>{tip.setAttribute("opacity","0");},delay+50));
}
function animateBrushTip(med,len,dur,tip){
  const svg=$("#strokeSvg"),layer=$("#strokeLayer");
  const t0=performance.now();tip.setAttribute("opacity","1");
  (function follow(){
    const e=Math.min(1,(performance.now()-t0)/dur);
    const pt=med.getPointAtLength(len*e);
    // o ponto está no sistema do layer (Y invertido); converte p/ viewBox do svg
    tip.setAttribute("cx",pt.x);tip.setAttribute("cy",900-pt.y);
    if(e<1)requestAnimationFrame(follow);
  })();
}

function grade(z,g){const c=S.srs[z];const now=Date.now();const DAY=864e5;

  else{
    if(c.interval===0)c.interval=g===1?.5:1;
    else c.interval=Math.round(c.interval*(g===1?1.2:c.ease));
    c.ease=Math.min(2.8,c.ease+(g===3?.12:g===2?0:-.08));

  let d="M"+pts[0][0]+" "+pts[0][1];
  for(let i=1;i<pts.length;i++){const[x,y]=pts[i],[px,py]=pts[i-1];d+=" Q"+px+" "+py+" "+((x+px)/2)+" "+((y+py)/2);}
  dBody.setAttribute("d",d);dSpine.setAttribute("d",d);
  let fins="";
  for(let i=3;i<seg-1;i+=2){const[x,y]=pts[i],[nx,ny]=pts[i+1];
    const ang=Math.atan2(ny-y,nx-x)-Math.PI/2,fx=x+Math.cos(ang)*13,fy=y+Math.sin(ang)*13;
    fins+=`<path d="M${x} ${y} L${fx} ${fy} L${nx} ${ny} Z" fill="#d4332e" opacity=".7"/>`;}
  dFins.innerHTML=fins;
  const head=pts[seg],neck=pts[seg-2];
  const hang=Math.atan2(head[1]-neck[1],head[0]-neck[0]);
  dHead.setAttribute("transform",`translate(${head[0]},${head[1]}) rotate(${hang*180/Math.PI})`);
  const px=head[0]+Math.cos(hang)*46,py=head[1]+Math.sin(hang)*46+Math.sin(dPh*2)*3;
  dPearl.setAttribute("cx",px);dPearl.setAttribute("cy",py);
  dPearlGlow.setAttribute("cx",px);dPearlGlow.setAttribute("cy",py);
  requestAnimationFrame(dragonLoop);
})();

function crane(){const c=document.createElementNS("http://www.w3.org/2000/svg","svg");c.setAttribute("viewBox","0 0 120 60");
  c.style.cssText="position:fixed;top:"+rand(10,40)+"%;left:-140px;width:120px;z-index:7;pointer-events:none;filter:drop-shadow(0 0 8px rgba(231,199,90,.6))";
  c.innerHTML='<path d="M5 40 Q30 10 55 30 Q70 42 95 22 L110 18" stroke="#e7c75a" stroke-width="1.5" fill="none"/><circle cx="110" cy="18" r="3" fill="#e7c75a"/>';
  document.body.appendChild(c);c.animate([{transform:"translateX(0)"},{transform:"translateX("+(innerWidth+200)+"px)"}],{duration:14000,easing:"linear"}).onfinish=()=>c.remove();resetIdle();}
