<style>
:root{--bg:#08070d;--panel:rgba(20,15,27,.82);--panel2:rgba(46,32,48,.72);--text:#fff1d6;--muted:rgba(255,241,214,.68);--dim:rgba(255,241,214,.42);--gold:#e7c75a;--red:#d83a32;--jade:#3fa99a;--violet:#8d63ff;--serif:Georgia,serif;--sans:system-ui,-apple-system,Segoe UI,sans-serif}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}button{font:inherit;cursor:pointer}#app{position:fixed;inset:0;overflow:hidden;background:radial-gradient(circle at 50% 15%,rgba(141,99,255,.24),transparent 28%),radial-gradient(circle at 82% 78%,rgba(63,169,154,.18),transparent 32%),linear-gradient(180deg,#080711,#17101d 54%,#09070d)}canvas{position:fixed;inset:0;width:100%;height:100%;display:block}#sky{z-index:0}#fx{z-index:6;pointer-events:none}.mountains{position:fixed;left:0;right:0;bottom:-2vh;height:43vh;z-index:1;pointer-events:none;opacity:.9}.mist{position:fixed;inset:auto -10vw 0 -10vw;height:46vh;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 30% 80%,rgba(255,241,214,.08),transparent 45%),radial-gradient(ellipse at 70% 60%,rgba(91,208,232,.08),transparent 48%);filter:blur(18px)}.brand{position:fixed;top:22px;left:24px;z-index:30}.brand .jp{font-family:var(--serif);font-size:26px;letter-spacing:.12em}.brand .sub{font-size:10px;text-transform:uppercase;letter-spacing:.35em;color:var(--gold);margin-top:3px}.clock{position:fixed;right:24px;top:24px;z-index:30;text-align:right;color:var(--dim);font-size:11px;letter-spacing:.18em}.clock b{display:block;color:var(--jade);font-family:var(--serif);font-size:16px;font-weight:400}.academy{position:fixed;left:50%;top:49%;transform:translate(-50%,-50%);z-index:4;width:min(62vmin,590px);height:min(62vmin,590px);pointer-events:none}.ring{position:absolute;inset:0;border:1px solid rgba(231,199,90,.28);border-radius:50%;animation:spin 70s linear infinite}.r2{inset:12%;border-style:dashed;border-color:rgba(63,169,154,.34);animation-duration:46s;animation-direction:reverse}.r3{inset:25%;border-color:rgba(141,99,255,.38);animation-duration:32s}.seal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46%;aspect-ratio:1;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle,rgba(231,199,90,.14),rgba(216,58,50,.06) 46%,transparent 70%);font-family:var(--serif);font-size:min(18vmin,146px);text-shadow:0 0 42px rgba(231,199,90,.45);animation:breathe 5.4s ease-in-out infinite}.temple{position:absolute;left:50%;bottom:9%;transform:translateX(-50%);width:72%;height:34%;filter:drop-shadow(0 28px 45px rgba(0,0,0,.5))}.roof{position:absolute;left:4%;right:4%;top:0;height:32%;background:linear-gradient(135deg,#7d1518,#d83a32);clip-path:polygon(0 70%,12% 22%,50% 0,88% 22%,100% 70%,72% 58%,50% 48%,28% 58%)}.body{position:absolute;left:18%;right:18%;top:29%;bottom:0;background:linear-gradient(180deg,rgba(255,241,214,.16),rgba(255,241,214,.055));border:1px solid rgba(231,199,90,.32);border-radius:8px 8px 0 0}.door{position:absolute;left:42%;right:42%;bottom:0;height:58%;background:rgba(0,0,0,.32);border:1px solid rgba(231,199,90,.24);border-bottom:0}.pillar{position:absolute;top:38%;bottom:0;width:5%;background:linear-gradient(#e7c75a,#8b5d1f)}.p1{left:25%}.p2{right:25%}@keyframes spin{to{transform:rotate(360deg)}}@keyframes breathe{50%{transform:translate(-50%,-50%) scale(1.055);filter:brightness(1.18)}}.panel{background:linear-gradient(145deg,var(--panel),var(--panel2));border:1px solid rgba(231,199,90,.34);box-shadow:0 28px 100px rgba(0,0,0,.45),inset 0 0 50px rgba(231,199,90,.025);backdrop-filter:blur(16px);border-radius:20px}.pad{padding:16px}.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.26em;color:var(--gold)}.title{font-family:var(--serif);font-weight:700;font-size:21px;margin-top:5px;color:#fff6df}.small{font-size:13px;line-height:1.55;color:var(--muted)}.hud{position:fixed;left:22px;bottom:22px;z-index:50;width:min(420px,calc(100vw - 44px));display:grid;gap:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.stat{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.052);border-radius:13px;padding:10px}.stat b{display:block;color:var(--gold);font-size:18px}.stat span{font-size:9px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}.xpbar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:12px}.xpbar i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--jade),var(--gold));box-shadow:0 0 20px rgba(231,199,90,.5);transition:.6s}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.btn{border:1px solid rgba(231,199,90,.42);background:rgba(231,199,90,.11);color:var(--text);border-radius:999px;padding:9px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;transition:.2s}.btn:hover{transform:translateY(-1px);border-color:var(--gold);background:rgba(231,199,90,.19)}.primary{background:linear-gradient(135deg,var(--red),var(--violet));border-color:rgba(231,199,90,.5)}.trail{position:fixed;right:22px;top:92px;z-index:45;width:min(365px,calc(100vw - 44px))}.steps{display:grid;gap:8px;margin-top:12px}.step{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center;padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04)}.step.active{border-color:rgba(231,199,90,.62);box-shadow:inset 0 0 24px rgba(231,199,90,.04)}.step.done{border-color:rgba(63,169,154,.55)}.orb{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.1);font-weight:800}.active .orb{background:var(--gold);color:#130d05}.done .orb{background:var(--jade);color:#04130f}.step strong{font-size:12px}.step small{display:block;color:var(--dim);font-size:10px;margin-top:2px}.reward{font-size:10px;color:var(--gold);white-space:nowrap}.codex{position:fixed;right:22px;bottom:88px;z-index:45;width:min(365px,calc(100vw - 44px));max-height:34vh;overflow:auto}.words{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.word{text-align:center;border:1px solid rgba(231,199,90,.22);background:rgba(0,0,0,.20);border-radius:13px;padding:9px 5px;min-height:75px}.word.lock{opacity:.35;filter:grayscale(1)}.hz{font-family:var(--serif);font-size:26px;color:var(--gold)}.py{font-size:10px;color:var(--muted)}.pt{font-size:9px;color:var(--dim);margin-top:3px}.shade{position:fixed;inset:0;z-index:80;background:rgba(5,4,9,.55);backdrop-filter:blur(8px);display:none}.modal{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:81;width:min(720px,calc(100vw - 44px));display:none}.dialogRow{display:flex;gap:14px;align-items:flex-start}.portrait{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;background:radial-gradient(circle,var(--gold),var(--red));color:#160c05;font-family:var(--serif);font-size:28px;font-weight:800}.toast{position:fixed;left:50%;top:20px;transform:translateX(-50%) translateY(-10px);z-index:100;background:rgba(18,14,24,.95);border:1px solid rgba(231,199,90,.55);border-radius:999px;padding:12px 18px;color:var(--text);opacity:0;transition:.25s;box-shadow:0 20px 70px rgba(0,0,0,.45);pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.menu{position:fixed;left:50%;top:22px;transform:translateX(-50%);z-index:35;display:flex;gap:8px}.menu .btn{background:rgba(18,14,24,.56);backdrop-filter:blur(10px)}.sound{position:fixed;right:24px;bottom:24px;z-index:40;width:48px;height:48px;border-radius:50%;display:grid;place-items:center}.mascot{position:fixed;right:5vw;bottom:4vh;z-index:4;font-size:min(20vw,170px);filter:drop-shadow(0 0 48px rgba(231,199,90,.24));animation:bob 4s ease-in-out infinite}@keyframes bob{50%{transform:translateY(-12px)}}@media(max-width:980px){.trail,.codex,.mascot{display:none}.menu{top:auto;bottom:230px}.hud{left:12px;bottom:12px;width:calc(100vw - 24px)}.brand{left:16px;top:16px}.clock{right:16px;top:18px}.academy{width:82vmin;height:82vmin;opacity:.72}.stats{grid-template-columns:repeat(2,1fr)}}
</style>

<body>
<div id="app"><canvas id="sky"></canvas><canvas id="fx"></canvas><svg class="mountains" viewBox="0 0 1440 420" preserveAspectRatio="none"><path fill="#151122" d="M0 280 C210 145 350 310 560 210 C760 110 940 310 1160 190 C1300 130 1385 235 1440 215 L1440 420 L0 420 Z"/><path fill="#211832" opacity=".86" d="M0 340 C220 250 390 345 610 285 C820 230 1010 340 1210 280 C1340 240 1410 304 1440 295 L1440 420 L0 420 Z"/></svg><div class="mist"></div><div class="brand"><div class="jp">祭 学院</div><div class="sub">Matsuri Academy</div></div><div class="clock"><b>夜 Reino 1</b><span id="time">--:--</span></div><div class="academy"><div class="ring"></div><div class="ring r2"></div><div class="ring r3"></div><div class="seal">武</div><div class="temple"><div class="roof"></div><div class="body"></div><div class="door"></div><div class="pillar p1"></div><div class="pillar p2"></div></div></div><div class="mascot">狐</div><nav class="menu"><button class="btn" id="openCodex">Biblioteca</button><button class="btn" id="openSifu">Sifu</button><button class="btn" id="resetBtn">Reset</button></nav><section class="hud"><div class="panel"><div class="pad"><div class="eyebrow">MVP jogável · Reino 1</div><div class="title" id="questTitle">—</div><p class="small" id="questDesc"></p><div class="xpbar"><i id="xpFill"></i></div><div class="stats"><div class="stat"><b id="xp">0</b><span>XP</span></div><div class="stat"><b id="coins">0</b><span>Moedas</span></div><div class="stat"><b id="wordCount">0</b><span>Palavras</span></div><div class="stat"><b id="streak">1</b><span>Dias</span></div></div><div class="actions"><button class="btn primary" id="completeBtn">Concluir missão</button><button class="btn" id="nextBtn">Próxima missão</button><button class="btn" id="talkBtn">Falar com Sifu</button></div></div></div></section><aside class="trail panel"><div class="pad"><div class="eyebrow">Trilha do Reino 1</div><div class="title">Caminho marcial-linguístico</div><div class="steps" id="steps"></div></div></aside><aside class="codex panel"><div class="pad"><div class="eyebrow">Biblioteca viva</div><div class="title">Pergaminhos</div><div class="words" id="words"></div></div></aside><button class="btn sound" id="sound">音</button><div class="shade" id="shade"></div><section class="modal panel" id="modal"><div class="pad"><div class="dialogRow"><div class="portrait">师</div><div><div class="eyebrow" id="modalEye">Sifu Chen</div><div class="title" id="modalTitle">—</div><p class="small" id="modalText"></p><div class="actions" id="modalActions"></div></div></div></div></section><div class="toast" id="toast"></div></div>
<script>
const $=s=>document.querySelector(s);const VOCAB=[['gongfu','功夫','gōngfu','kung fu'],['nihao','你好','nǐ hǎo','olá'],['shifu','师父','shīfu','sifu'],['quan','拳','quán','punho'],['da','打','dǎ','golpear'],['shou','手','shǒu','mão'],['jiao','脚','jiǎo','pé'],['qian','前','qián','frente'],['hou','后','hòu','trás'],['zuo','左','zuǒ','esquerda'],['you','右','yòu','direita'],['ti','踢','tī','chutar'],['dang','挡','dǎng','bloquear'],['zhuan','转','zhuǎn','girar']].map(([id,hz,py,pt])=>({id,hz,py,pt}));const QUESTS=[{id:'gate',name:'Os Tons do Portão',desc:'Cumprimente o guarda da academia. Desbloqueie 你好 e 师父.',xp:25,coins:8,words:['nihao','shifu'],sifu:'Muito bem. 你好 não é só “olá”; é uma porta aberta com respeito.'},{id:'punch',name:'O Primeiro Punho',desc:'Faça 20 socos lentos com respiração. Desbloqueie 拳, 打 e 手.',xp:35,coins:10,words:['quan','da','shou'],sifu:'拳 quán é punho. Mas no Choy Lay Fut, punho sem intenção é movimento vazio.'},{id:'stance',name:'Raiz no Pátio',desc:'Segure uma base confortável por 2 minutos. Desbloqueie 脚, 前 e 后.',xp:40,coins:12,words:['jiao','qian','hou'],sifu:'A raiz começa no pé, mas nasce na atenção. 前 é frente; 后 é recuo consciente.'},{id:'bamboo',name:'Caminho do Bambu',desc:'Leia o caminho: esquerda e direita. Desbloqueie 左 e 右.',xp:30,coins:9,words:['zuo','you'],sifu:'Quando você lê 左 e se move para a esquerda, o idioma vira corpo.'},{id:'kick',name:'Primeiro Chute',desc:'Execute 10 chutes baixos e controlados. Desbloqueie 踢.',xp:30,coins:9,words:['ti'],sifu:'踢 tī: chutar. Baixo, controlado e sem pressa.'},{id:'guard',name:'Defesa do Portão',desc:'Pratique bloqueios suaves e giros de base. Desbloqueie 挡 e 转.',xp:45,coins:14,words:['dang','zhuan'],sifu:'挡 é bloquear. 转 é girar. Defender também é mudar de direção.'}];const KEY='matsuri-clean-mvp-v1';function fresh(){return{xp:0,coins:0,streak:1,idx:0,done:[],words:['gongfu'],last:new Date().toISOString()}}let state;try{state={...fresh(),...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch{state=fresh()}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function toast(t){$('#toast').textContent=t;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),2600)}function q(){return QUESTS[state.idx%QUESTS.length]}function discover(ids){ids.forEach(id=>{if(!state.words.includes(id))state.words.push(id)})}function render(){let cur=q();$('#questTitle').textContent='Missão: '+cur.name;$('#questDesc').textContent=cur.desc;$('#xp').textContent=state.xp;$('#coins').textContent=state.coins;$('#wordCount').textContent=state.words.length;$('#streak').textContent=state.streak;$('#xpFill').style.width=Math.min(100,state.xp/260*100)+'%';$('#steps').innerHTML=QUESTS.map((x,i)=>`<div class="step ${state.done.includes(x.id)?'done':''} ${x.id===cur.id?'active':''}"><div class="orb">${state.done.includes(x.id)?'✓':i+1}</div><div><strong>${x.name}</strong><small>${x.desc}</small></div><div class="reward">+${x.xp} XP</div></div>`).join('');$('#words').innerHTML=VOCAB.map(w=>{let ok=state.words.includes(w.id);return `<div class="word ${ok?'':'lock'}"><div class="hz">${ok?w.hz:'？'}</div><div class="py">${ok?w.py:'bloqueado'}</div><div class="pt">${ok?w.pt:'complete missões'}</div></div>`}).join('')}function openModal(eye,title,text,actions=[]){$('#modalEye').textContent=eye;$('#modalTitle').textContent=title;$('#modalText').textContent=text;$('#modalActions').innerHTML='';actions.concat([['Fechar',closeModal]]).forEach(([label,fn])=>{let b=document.createElement('button');b.className='btn '+(label==='Continuar'?'primary':'');b.textContent=label;b.onclick=fn;$('#modalActions').appendChild(b)});$('#shade').style.display='block';$('#modal').style.display='block'}function closeModal(){$('#shade').style.display='none';$('#modal').style.display='none'}function complete(){let cur=q();if(state.done.includes(cur.id)){toast('Essa missão já foi concluída. Vá para a próxima.');return}state.xp+=cur.xp;state.coins+=cur.coins;state.done.push(cur.id);discover(cur.words);save();render();toast(`+${cur.xp} XP · +${cur.coins} moedas · palavras desbloqueadas`);openModal('Sifu Chen',cur.name,cur.sifu,[['Continuar',closeModal],['Próxima missão',()=>{closeModal();next()}]])}function next(){state.idx=(state.idx+1)%QUESTS.length;save();render();toast('Nova missão selecionada')}$('#completeBtn').onclick=complete;$('#nextBtn').onclick=next;$('#talkBtn').onclick=()=>openModal('Sifu Chen','Treino do dia','Discípula, complete a missão atual. O idioma precisa passar pelo corpo para criar raiz.',[['Concluir missão',complete]]);$('#openSifu').onclick=$('#talkBtn').onclick;$('#openCodex').onclick=()=>openModal('Biblioteca Viva','Pergaminhos desbloqueados',`Você descobriu ${state.words.length} palavras. Cada uma entra por missão, diálogo, objeto ou técnica.`,[]);$('#resetBtn').onclick=()=>{if(confirm('Resetar progresso local?')){state=fresh();save();render();toast('Progresso resetado')}};$('#shade').onclick=closeModal;function clock(){let d=new Date();$('#time').textContent=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}clock();setInterval(clock,2e4);const sky=$('#sky'),fx=$('#fx'),sc=sky.getContext('2d'),fc=fx.getContext('2d');let W,H,DPR,stars=[],petals=[];function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;[sky,fx].forEach(c=>{c.width=W*DPR;c.height=H*DPR;c.style.width=W+'px';c.style.height=H+'px';c.getContext('2d').setTransform(DPR,0,0,DPR,0,0)});stars=Array.from({length:130},()=>({x:Math.random()*W,y:Math.random()*H*.72,r:Math.random()*1.6+.3,p:Math.random()*7}));if(!petals.length)petals=Array.from({length:42},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*10+6,v:Math.random()*.55+.25,r:Math.random()*6}))}addEventListener('resize',resize);resize();let t=0;function loop(){t+=.016;sc.clearRect(0,0,W,H);stars.forEach(s=>{sc.globalAlpha=(.22+.78*Math.abs(Math.sin(t+s.p)));sc.fillStyle='#fff7d6';sc.beginPath();sc.arc(s.x,s.y,s.r,0,7);sc.fill()});sc.globalAlpha=1;fc.clearRect(0,0,W,H);petals.forEach(p=>{p.y+=p.v;p.x+=Math.sin(p.y*.01+t)*.35;p.r+=.015;if(p.y>H+20){p.y=-20;p.x=Math.random()*W}fc.save();fc.translate(p.x,p.y);fc.rotate(p.r);let g=fc.createLinearGradient(0,-p.s,0,p.s);g.addColorStop(0,'rgba(231,199,90,.9)');g.addColorStop(1,'rgba(216,58,50,.45)');fc.fillStyle=g;fc.beginPath();fc.moveTo(0,-p.s);fc.bezierCurveTo(p.s*.65,-p.s*.2,p.s*.4,p.s*.8,0,p.s);fc.bezierCurveTo(-p.s*.4,p.s*.8,-p.s*.65,-p.s*.2,0,-p.s);fc.fill();fc.restore()});requestAnimationFrame(loop)}loop();let actx,master,on=false;function startAudio(){actx=new (window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0;master.connect(actx.destination);[196,261.63,329.63].forEach(f=>{let o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.075;o.connect(g);g.connect(master);o.start()});setInterval(()=>{if(!on)return;let o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=[523,659,784][Math.floor(Math.random()*3)];g.gain.setValueAtTime(.001,actx.currentTime);g.gain.exponentialRampToValueAtTime(.16,actx.currentTime+.05);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+2.5);o.connect(g);g.connect(master);o.start();o.stop(actx.currentTime+2.6)},6500)}$('#sound').onclick=()=>{if(!actx)startAudio();on=!on;master.gain.linearRampToValueAtTime(on?.65:0,actx.currentTime+1);$('#sound').textContent=on?'♫':'音';toast(on?'Trilha sonora ligada':'Trilha sonora desligada')};render();setTimeout(()=>toast('MVP carregado: conclua missões para desbloquear vocabulário.'),700);
</script></body></html>
